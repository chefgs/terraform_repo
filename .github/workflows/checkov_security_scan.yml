# Checkov Security Scan for Terraform Code
# Scans all Terraform configurations in the repository for security and
# compliance misconfigurations and generates a report with issues.

name: Checkov Terraform Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  checkov_scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results to GitHub Code Scanning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.5.2

      - name: Run Checkov Terraform Security Scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          # Generate SARIF report for GitHub Code Scanning integration
          output_format: sarif
          output_file_path: reports/
          # Also produce a CLI summary for the workflow log
          quiet: false
          soft_fail: true  # Don't fail the workflow; report issues only

      - name: Upload SARIF report to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even if Checkov finds issues
        with:
          sarif_file: reports/results.sarif
          category: checkov-terraform

      - name: Upload Checkov report as workflow artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-security-report
          path: reports/results.sarif
          retention-days: 30
