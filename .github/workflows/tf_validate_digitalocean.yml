name: Terraform DigitalOcean Validate

on:
  push:
    branches: [ main ]
    paths:
      - 'digitalocean/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'digitalocean/**'
  workflow_dispatch:
    inputs:
      tfpath:
        description: 'TF Code Path'
        required: false
        default: 'digitalocean/create-vm'

jobs:
  terraform_validate:
    name: Terraform Validate – DigitalOcean
    runs-on: ubuntu-latest
    env:
      TFPATH: ${{ github.event.inputs.tfpath || 'digitalocean/create-vm' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3.5.2

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v2.0.2

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.TFPATH }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TFPATH }}
