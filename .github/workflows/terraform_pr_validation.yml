name: Terraform PR Validation

# This workflow validates all Terraform code changes in a PR WITHOUT applying
# anything to real infrastructure. It performs:
#   1. terraform fmt --check  (code formatting)
#   2. terraform validate     (syntax + config validity, no credentials needed)
#   3. checkov security scan  (ensures security fixes are in place)
#
# This allows the PR to be safely reviewed and merged knowing the code is
# syntactically valid and passes security checks, even before live testing.

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "copilot/**", "feature/**" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Terraform format check (all .tf files)
  # ─────────────────────────────────────────────
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: |
          echo "Checking Terraform code formatting..."
          terraform fmt -check -recursive -diff .
        # Use continue-on-error so fmt issues are reported but don't block validate/checkov
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: terraform validate on each changed TF directory (no creds needed)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Core directories that contain the security-related changes from this PR
        tf_dir:
          - aws_samples/aws_tf_code
          - aws_samples/aws_web_tier
          - aws_samples/create_ec2
          - aws_samples/iac-terraform-101/aws_tf_code
          - aws_samples/iac-terraform-101/create_ec2
          - aws_samples/iac-terraform-101/live_demo
          - aws_samples/iac-terraform-101/s3
          - aws_samples/iac-terraform-101/tf_modules_sample/modules/create_ec2
          - aws_samples/tf_modules_sample/modules/create_ec2
          - aws_samples/sample
          - aws_samples/aws_cloudfront
          - aws_samples/s3-dynamodb-module/modules/s3
          - aws_samples/s3-dynamodb-module/modules/dynamodb
          - aws_web_tier
          - aws_eks_module_demo/eks-from-own-module/modules/eks
          - aws_eks_module_demo/eks-from-own-module/modules/vpc
          - aws_eks_module_demo/eks-from-official-module/modules/vpc
          - tf-ec2-with-modules/terraform-project/modules/ec2
          - tf-ec2-with-modules/terraform-project/modules/security-group
          - tf-ec2-with-modules/terraform-project/modules/subnet
          - tfcloud_samples/modules/aws_two_tier
          - youtube_tf_demo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (backend disabled — no credentials needed)
        run: terraform init -backend=false
        working-directory: ${{ matrix.tf_dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.tf_dir }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: checkov security scan — verifies security fixes are in place
  # ─────────────────────────────────────────────────────────────────────────
  checkov-security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          # Soft-fail so results are always reported as annotations even if
          # some lower-severity checks still fail
          soft_fail: true
          output_format: cli
          # Skip checks that are intentional / not applicable to this repo
          # CKV_TF_1: module commit hashes (external registry modules in examples)
          # CKV2_AWS_41: IAM role on every EC2 (demo instances don't always need one)
          skip_check: CKV_TF_1,CKV2_AWS_41

      - name: Upload Checkov SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        # Uploading SARIF is optional — don't fail if the file wasn't produced
        continue-on-error: true
